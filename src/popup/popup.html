<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>LiveNote 설정</title>
  </head>
  <body>
    <header>
      <h1>📝 LiveNote</h1>
      <p class="sub">유튜브 라이브 자막 → 종목 타임라인</p>
    </header>

    <section class="card">
      <div class="status-row">
        <span class="label">내장 AI(Gemini Nano)</span>
        <span id="ai-status" class="badge">확인 중…</span>
      </div>
      <p class="hint">
        상태가 "다운로드 필요"면 유튜브 영상에서 첫 자막이 정제될 때 모델이 자동 내려받아집니다.
        "미지원"이면 Chrome 138+ 인지, <code>chrome://flags</code>의 Prompt API 플래그가 켜져 있는지 확인하세요.
      </p>
    </section>

    <section class="card">
      <label class="row">
        <input type="checkbox" id="hide" />
        <span>DOM 수집 시 영상의 자막 화면 숨기기</span>
      </label>
    </section>

    <section class="card">
      <div class="dict-head">
        <span class="label">내 종목 / 키워드 사전</span>
        <span id="dict-info" class="muted"></span>
      </div>
      <div class="chip-input">
        <input id="kw-input" type="text" placeholder="종목·키워드 입력 후 Enter" />
        <button id="kw-add" class="primary sm" type="button">추가</button>
      </div>
      <div id="chips" class="chips"></div>
      <span id="saved" class="saved" hidden>저장됨 ✓</span>
    </section>

    <footer>
      <span>온디바이스 처리 · 외부 전송 없음</span>
    </footer>

    <script src="../content/stocks.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
